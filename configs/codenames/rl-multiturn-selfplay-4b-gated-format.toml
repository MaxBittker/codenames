model = "Qwen/Qwen3-4B-Instruct-2507"
env_files = ["../../.env"]
max_steps = 250
batch_size = 2048
rollouts_per_example = 16

[sampling]
max_tokens = 2048

[[env]]
id = "maxbittker/codenames"
args = { train_size = 100000, eval_size = 500, self_play = true, efficiency_weight = 2.0 }

[eval]
interval = 25
num_examples = 20
rollouts_per_example = 4

[[eval.env]]
id = "maxbittker/codenames"
args = { train_size = 100000, eval_size = 500, self_play = true, efficiency_weight = 2.0 }

[wandb]
project = "codenames"
name = "multiturn-4b-gated-format-partial-eff"
entity = "maxbittker-websim"

[checkpoints]
interval = 25

[adapters]
interval = 25
keep_last = -1

[infrastructure]
compute_size = "S"
