model = "Qwen/Qwen3-4B-Thinking-2507"
env_files = ["../../.env"]
max_steps = 200
batch_size = 256
rollouts_per_example = 16
max_async_level = 4

[sampling]
max_tokens = 4096

[[env]]
id = "maxbittker/codenames"
args = { train_size = 100000, eval_size = 500, self_play = true, guesser_model = "qwen/qwen3-8b" }

[eval]
interval = 25
num_examples = 20
rollouts_per_example = 4

[[eval.env]]
id = "maxbittker/codenames"
args = { train_size = 100000, eval_size = 500, self_play = true, guesser_model = "qwen/qwen3-8b" }

[wandb]
project = "codenames"
name = "qwen3-4b-t-selfplay"
entity = "maxbittker-websim"

[checkpoints]
interval = 50

[infrastructure]
compute_size = "L"
