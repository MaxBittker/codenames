# Qwen3-4B-Instruct on Codenames (self-managed on Prime on-demand cloud)
#
# Self-play: the training model serves as both cluegiver AND guesser.
# No external API keys needed (no OpenAI calls).
#
# Matches rl-resume-sf6x.toml parameters but starts from scratch (no checkpoint).
#
# Requirements: 2x H100 (1 inference, 1 training)
# Env vars needed: WANDB_API_KEY (optional, for logging)

max_steps = 200
seq_len = 2048

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[wandb]
project = "codenames"
name = "qwen3-4b-i-selfmanaged-selfplay"

[ckpt]
interval = 50

[orchestrator]
batch_size = 2048
rollouts_per_example = 16

[orchestrator.sampling]
max_tokens = 4096

[[orchestrator.env]]
id = "codenames"

[orchestrator.env.args]
train_size = 100000
eval_size = 500
self_play = true

[orchestrator.eval]
interval = 25
num_examples = 20
rollouts_per_example = 4

[[orchestrator.eval.env]]
id = "codenames"

[orchestrator.eval.env.args]
train_size = 100000
eval_size = 500
self_play = true

[trainer.optim]
lr = 3e-6

[inference]
