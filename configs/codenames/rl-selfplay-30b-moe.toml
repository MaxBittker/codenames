model = "Qwen/Qwen3-30B-A3B-Instruct-2507"
max_steps = 125
batch_size = 2048
rollouts_per_example = 16

[sampling]
max_tokens = 512

[[env]]
id = "maxbittker/codenames"
args = { train_size = 100000, eval_size = 500, self_play = true, guesser_model = "Qwen/Qwen3-30B-A3B-Instruct-2507" }

[eval]
interval = 25
num_examples = 20
rollouts_per_example = 4

[[eval.env]]
id = "maxbittker/codenames"
args = { train_size = 100000, eval_size = 500, self_play = true, guesser_model = "Qwen/Qwen3-30B-A3B-Instruct-2507" }

[checkpoints]
interval = 50

[infrastructure]
compute_size = "L"
