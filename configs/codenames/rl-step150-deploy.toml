model = "Qwen/Qwen3-4B-Instruct-2507"
env_files = ["../../.env"]
max_steps = 151
batch_size = 2048
rollouts_per_example = 16

# Start from step 150 - trains 1 additional step to produce a deployable adapter
checkpoint_id = "hj7a4krp4jac65gj1azdny5f"

[sampling]
max_tokens = 4096

[[env]]
id = "maxbittker/codenames"
args = { train_size = 100000, eval_size = 500, self_play = true }

[wandb]
project = "codenames"
name = "qwen3-4b-i-step150-deploy"
entity = "maxbittker-websim"

[adapters]
interval = 1
keep_last = -1

[infrastructure]
compute_size = "S"
