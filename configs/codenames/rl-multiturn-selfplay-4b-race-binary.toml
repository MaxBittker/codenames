model = "Qwen/Qwen3-4B-Instruct-2507"
env_files = ["../../.env"]
max_steps = 250
batch_size = 2048
rollouts_per_example = 16

[sampling]
max_tokens = 2048

[[env]]
id = "maxbittker/codenames"
args = { train_size = 100000, eval_size = 500, self_play = true, min_opponent_rate = 0.5, max_opponent_rate = 3.0, game_reward_weight = 1.0, reward_mode = "binary" }

[eval]
interval = 25
num_examples = 20
rollouts_per_example = 4

[[eval.env]]
id = "maxbittker/codenames"
args = { train_size = 100000, eval_size = 500, self_play = true, min_opponent_rate = 0.5, max_opponent_rate = 3.0, game_reward_weight = 1.0, reward_mode = "binary" }

[wandb]
project = "codenames"
name = "multiturn-4b-binary-nopitter-fuzz"
entity = "maxbittker-websim"

[checkpoints]
interval = 25

[adapters]
interval = 25
keep_last = -1

[infrastructure]
compute_size = "S"
